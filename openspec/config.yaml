schema: spec-driven
context: |
  Project: MyRecall-v3 (Edge-centric, vision-only). Reference repo: _ref/screenpipe
  Current substage: P1-S2a (事件驱动采集)
  ADR: docs/v3/adr/ADR-0013-event-driven-ax-split.md
  
  SSOT documents (MUST read before writing any artifact):
  - docs/v3/spec.md — 架构总览、API 契约、capture pipeline 定义
  - docs/v3/acceptance/phase1/p1-s2a.md — 验收步骤、Entry/Exit Gate(P1-S2a primary reference)
  - docs/v3/gate_baseline.md — Gate/SLO 指标口径、公式、判定规则
  - docs/v3/data-model.md — DDL、CapturePayload 定义、capture_trigger 字段
  - docs/v3/roadmap.md — 阶段目标、Exit Gate 条件
  - docs/v3/http_contract_ledger.md — P1-S2a delta: capture_trigger on POST /v1/ingest

  Precedence rule:
  - If this config conflicts with SSOT docs above, SSOT docs win.
  
  Inherited from P1-S1 (frozen):
  - /v1/ingest 基础链路、queue-observability、frame-serving、legacy /api/* 301/410
  - processing_mode=noop (unchanged until P1-S3)
  
  Scope invariants:
  - Vision-only for P1-P3 (no audio)
  - macOS-only for P1 (Windows/Linux deferred to P2)
  - Python implementation (ADR-0013)

  ASCII Anchors (literal-match; do not translate/paraphrase):
  # Trigger types (P1 enum)
  - capture_trigger, idle, app_switch, manual, click
  # Permission states
  - granted, transient_failure, denied_or_revoked, recovering
  # Metrics
  - trigger_coverage, queue_saturation_ratio, collapse_trigger_count, overflow_drop_count, capture_latency_p95
  # UI anchors
  - "#mr-health", data-state, healthy, unreachable, degraded
  
rules:
  proposal:
    - "Output language: Chinese. Keep all ASCII Anchors exactly literal."
    - Always include a "Non-goals" section
    - "Capabilities naming guidance (kebab-case; keep small): event-capture, debounce, backpressure, idle-fallback, permission-state-machine, capture-trigger-tag, health-permission-status."
  specs:
    - "Output language: Chinese. Keep all ASCII Anchors exactly literal."
    - Classify changes from capture-pipeline perspective (trigger → debounce → queue → ingest)
  design:
    - "Output language: Chinese. Keep all ASCII Anchors exactly literal."
    - "Design must be codebase-grounded: reference existing entry points under openrecall/server and openrecall/client."
    - For each key decision, if screenpipe has a comparable pattern, cite screenpipe file path + aligned vs intentionally different
  tasks:
    - "Output language: Chinese. Keep all ASCII Anchors exactly literal."
    - 'tasks.md must be split into two top-level sections: "## Implementation Tasks" (code changes) and "## Acceptance Verification" (verification actions)'
    - "Every implementation task must be atomic (target: finish + verify in < 30 minutes)"
